<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Estudios</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Portal de Estudios</span>
      <div class="d-flex align-items-center">
        <span class="text-white me-3" id="nombre-usuario">Cargando...</span>
        <button class="btn btn-outline-light btn-sm" id="btn-logout">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <div class="container">

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <h4 class="mb-4">Mis Estudios</h4>

        <!-- Buscador -->
        <div class="mb-3">
          <label for="buscador" class="form-label">Buscar por tipo de estudio</label>
          <input
            type="text"
            class="form-control"
            id="buscador"
            placeholder="Ej: ecografia, rx torax...">
        </div>

        <!-- Tabla -->
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Número</th>
                <th>Fecha</th>
                <th>Estudio</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="tabla-estudios">
              <!-- Las filas se cargan dinámicamente con JS -->
              <tr>
                <td colspan="4" class="text-center text-muted py-4">Cargando estudios...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>

  <!-- SweetAlert2 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

  <!-- Bootstrap JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="assets/js/estudios.js"></script>

</body>
</html>
