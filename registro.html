<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Estudios - Registro</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
      <div class="col-md-5">

        <div class="card shadow-sm">
          <div class="card-body p-4">

            <h3 class="text-center mb-1">Crear Cuenta</h3>
            <p class="text-center text-muted mb-4">Completá tus datos para registrarte</p>

            <form id="form-registro">

              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre y Apellido</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
              </div>

              <div class="mb-3">
                <label for="documento" class="form-label">Número de Documento</label>
                <input type="text" class="form-control" id="documento" name="documento" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
              </div>

              <div class="mb-3">
                <label for="password_confirm" class="form-label">Repetir Contraseña</label>
                <input type="password" class="form-control" id="password_confirm" name="password_confirm"  required>
              </div>

              <button type="submit" class="btn btn-primary w-100" id="btn-registro">
                Registrarme
              </button>

            </form>

            <p class="text-center mt-3 mb-0">
              ¿Ya tenés cuenta? <a href="index.html">Iniciar sesión</a>
            </p>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SweetAlert2 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

  <!-- Bootstrap JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Nuestro JS -->
  <script src="assets/js/registro.js"></script>

</body>
</html>
